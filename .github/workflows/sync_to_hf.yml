name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          CURRENT_BRANCH=$(git branch --show-current)
          git push --force https://harujionhitori:$HF_TOKEN@huggingface.co/spaces/harujionhitori/pqr-anomaly-detection "$CURRENT_BRANCH":main
