name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main ] # Ubah ke master jika branch utamamu namanya master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://huggingface.co/spaces/harujionhitori/pqr-anomaly-detection
          git push --force hf main
